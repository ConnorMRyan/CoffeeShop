name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Testing across modern Python versions compatible with your stack
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and setup Python
        uses: astral-sh/setup-uv@v7
        with:
          # Automatically caches downloaded wheels (huge time saver for PyTorch/Tensordict)
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # Uses the uv.lock file to ensure exact reproducibility in CI
        run: uv sync --all-extras --locked

      - name: Run tests (Pytest & Hypothesis)
        run: uv run pytest tests/