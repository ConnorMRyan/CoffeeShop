name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.2.0 numpy==1.26.4 scipy==1.10.0 omegaconf gymnasium shimmy pytest

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

      - name: Placeholder import check
        if: always()
        run: python -c "import torch; import omegaconf; print('imports ok')"
